<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="logo.png" />
  <title>GOODFARMER - Asistencia Técnicos</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
      padding: 20px;
      box-sizing: border-box;
      background-color: #f9f9f9;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      padding: 10px;
    }
    .return-button {
      font-size: 20px;
      padding: 10px 20px;
      background-color: #ed1922;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      position: absolute;
      left: 10px;
      text-decoration: none;
    }
    .return-button:hover { background-color: #c2161b; }
    .logo { width: 250px; height: auto; }
    
    .container {
      max-width: 600px;
      margin: 40px auto;
      background-color: #fff;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    h1 { color: #ed1922; }
    
    .search-box {
      margin: 20px 0;
      position: relative;
    }
    input[type="text"] {
      width: 100%;
      padding: 15px;
      font-size: 1.1rem;
      border: 2px solid #ddd;
      border-radius: 10px;
      box-sizing: border-box;
      outline: none;
    }
    input[type="text"]:focus { border-color: #ed1922; }
    
    .results-card {
      display: none;
      margin-top: 30px;
      text-align: left;
      padding: 20px;
      border-radius: 10px;
      background-color: #f1f1f1;
    }
    .days-badge {
      display: inline-block;
      padding: 10px 15px;
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
      border-radius: 8px;
      margin-top: 10px;
    }
    .positive { background-color: #00B050; }
    .negative { background-color: #FF0000; }
    .neutral { background-color: #888; }
    
    ul.libre-list {
      list-style-type: none;
      padding: 0;
      max-height: 250px;
      overflow-y: auto;
      margin-top: 15px;
    }
    ul.libre-list li {
      background: #fff;
      margin: 5px 0;
      padding: 10px;
      border-radius: 5px;
      border-left: 5px solid #ffc000;
    }
    @media (max-width: 800px) {
      .return-button { position: static; margin-bottom: 20px; }
      .header { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="index.html" class="return-button">← RETURN</a>
    <img src="logo.png" alt="GoodFarmer Logo" class="logo" />
  </div>

  <div class="container">
    <h1>CONSULTA DE DÍAS LIBRES</h1>
    <p>Escribe tu nombre o apellido para consultar tu asistencia:</p>
    
    <div class="search-box">
      <input type="text" id="tech-search" list="tech-list" placeholder="Cargando datos..." autocomplete="off" disabled>
      <datalist id="tech-list"></datalist>
    </div>

    <div id="results" class="results-card">
      <h2 id="tech-name" style="margin-top: 0; border-bottom: 2px solid #ddd; padding-bottom: 10px;"></h2>
      <div><strong>Estado Actual (Días):</strong> <br>
        <span id="tech-days" class="days-badge"></span>
      </div>
      
      <div style="margin-top: 20px;">
        <strong>Días faltados (Pendientes):</strong>
        <ul id="tech-history" class="libre-list"></ul>
      </div>
    </div>
  </div>

  <script>
    // 👇👇👇 PEGA TU ENLACE CSV DE GOOGLE SHEETS AQUÍ 👇👇👇
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRpftBSRIBGCkOIhOYP4m5t4V4vLksv9Q17dcupu8SXOw42loBJ-LzT3dYW97Lfcg/pub?output=csv";
    // 👆👆👆 ========================================= 👆👆👆

    let techData = {};

    // Analizador de CSV robusto (ignora comas dentro de comillas y saltos de línea invisibles)
    function procesarCSV(csvText) {
      const lineas = csvText.split('\n');
      const filas = lineas.map(linea => {
          let ret = [];
          let inQuote = false;
          let val = '';
          for (let i = 0; i < linea.length; i++) {
              let char = linea[i];
              if (char === '"') {
                  inQuote = !inQuote;
              } else if (char === ',' && !inQuote) {
                  ret.push(val.trim());
                  val = '';
              } else {
                  val += char;
              }
          }
          ret.push(val.trim());
          return ret.map(c => c.replace(/\r$/, '')); // Limpiar retornos de carro
      });

      let splitIdx = filas.length;
      let nameColIdx = -1;

      // Buscar dónde está la palabra "NAME" para saber en qué columna buscar y dónde se divide la tabla
      for (let i = 0; i < filas.length; i++) {
        for (let j = 0; j < Math.min(10, filas[i].length); j++) {
            const val = filas[i][j] ? filas[i][j].toUpperCase() : "";
            if (val === "NAME" || val === "NOMBRE") {
              splitIdx = i;
              nameColIdx = j;
            }
        }
      }

      if (nameColIdx === -1) nameColIdx = 1; // Si no lo encuentra, por defecto es la columna B (índice 1)

      // 1. Extraer los días disponibles (de la tabla inferior)
      const availableDays = {};
      for (let i = splitIdx + 1; i < filas.length; i++) {
        if (filas[i].length <= nameColIdx + 1) continue;
        const nombre = filas[i][nameColIdx] ? filas[i][nameColIdx].toUpperCase() : "";
        const diasStr = filas[i][nameColIdx + 1] ? filas[i][nameColIdx + 1] : "0";
        
        if (nombre && nombre !== "") {
          availableDays[nombre] = parseInt(diasStr) || 0;
        }
      }

      // 2. Identificar dónde termina la tabla azul (Buscamos la última fecha en la fila "FECHAS")
      let lastDateCol = -1;
      for (let i = 0; i < splitIdx; i++) {
          if (filas[i].some(c => c && (c.toUpperCase().includes("FECHAS") || c.toUpperCase().includes("FECHA")))) {
              for (let j = filas[i].length - 1; j >= 0; j--) {
                  if (filas[i][j] && filas[i][j] !== "") {
                      lastDateCol = j;
                      break;
                  }
              }
              break;
          }
      }

      // 3. Extraer SOLO las faltas pendientes (A la derecha de la tabla azul)
      for (let i = 0; i < splitIdx; i++) {
        const nombre = filas[i][nameColIdx] ? filas[i][nameColIdx].toUpperCase() : "";
        
        // Ignorar encabezados o filas vacías
        if (!nombre || ["NAME", "NOMBRE", "SEMANA", "FECHAS", "FIN DE SEMANA/FERIADO TRABAJADO"].includes(nombre)) continue;

        const libres = [];
        
        // Empezamos a buscar estrictamente después de que termina la tabla azul
        if (lastDateCol !== -1) {
            for (let j = lastDateCol + 1; j < filas[i].length; j++) {
              const val = filas[i][j] ? filas[i][j].toUpperCase() : "";
              if (val.startsWith("LIBRE") || val.startsWith("PERMISO")) {
                libres.push(val); 
              }
            }
        }

        // Si la persona existe en el recuento, la guardamos
        if (availableDays.hasOwnProperty(nombre)) {
            techData[nombre] = {
              dias_disponibles: availableDays[nombre],
              dias_libres: libres
            };
        }
      }
      
      return techData;
    }

    // Descargar y procesar datos
    fetch(CSV_URL)
      .then(response => response.text())
      .then(csvText => {
        const dataProcesada = procesarCSV(csvText);
        const datalist = document.getElementById('tech-list');
        
        datalist.innerHTML = '';
        
        for (const name in dataProcesada) {
          const option = document.createElement('option');
          option.value = name;
          datalist.appendChild(option);
        }

        const input = document.getElementById('tech-search');
        input.placeholder = "Selecciona o escribe tu nombre...";
        input.disabled = false;
      })
      .catch(error => {
        console.error('Error al cargar el CSV:', error);
        document.getElementById('tech-search').placeholder = "Error al cargar los datos.";
      });

    // Detectar búsqueda (Inteligente)
    document.getElementById('tech-search').addEventListener('input', function(e) {
      const typedText = e.target.value.trim().toUpperCase();
      const resultsDiv = document.getElementById('results');
      
      if (!typedText) {
          resultsDiv.style.display = 'none';
          return;
      }

      // Buscar el nombre que contenga lo que el usuario escribió (Ej. Si escribe "RIZO", encuentra "DARWIN RIZO")
      let matchedName = null;
      if (techData[typedText]) {
          matchedName = typedText;
      } else {
          for (const fullName in techData) {
              if (fullName.includes(typedText)) {
                  matchedName = fullName;
                  break;
              }
          }
      }
      
      if (matchedName) {
        const info = techData[matchedName];
        
        // ¡Aquí mostramos el Nombre COMPLETO siempre!
        document.getElementById('tech-name').textContent = matchedName; 
        
        const badge = document.getElementById('tech-days');
        badge.textContent = info.dias_disponibles;
        badge.className = 'days-badge';
        if (info.dias_disponibles > 0) badge.classList.add('positive');
        else if (info.dias_disponibles < 0) badge.classList.add('negative');
        else badge.classList.add('neutral');

        const historyList = document.getElementById('tech-history');
        historyList.innerHTML = '';
        
        if (info.dias_libres.length > 0) {
          info.dias_libres.forEach(dia => {
            const li = document.createElement('li');
            li.textContent = dia;
            historyList.appendChild(li);
          });
        } else {
          const li = document.createElement('li');
          li.textContent = "✅ No hay días pendientes por recuperar.";
          li.style.borderLeftColor = "#00B050";
          historyList.appendChild(li);
        }

        resultsDiv.style.display = 'block';
      } else {
        resultsDiv.style.display = 'none';
      }
    });
  </script>
</body>
</html>
