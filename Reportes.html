<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="logo.png" />
  <title>GOODFARMER - Buscador de Reportes</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
      padding: 20px;
      background-color: #f9f9f9;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      padding: 10px;
    }
    .return-button {
      font-size: 20px;
      padding: 10px 20px;
      background-color: #ed1922;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      position: absolute;
      left: 10px;
      text-decoration: none;
    }
    .return-button:hover { background-color: #c2161b; }
    .logo { width: 250px; height: auto; }
    
    .container {
      max-width: 1000px;
      margin: 40px auto;
      background-color: #fff;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h1 { color: #005A9C; text-align: center; }

    .filters {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-group {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
    }
    .filter-group label {
      font-weight: bold;
      margin-bottom: 5px;
      color: #555;
    }
    select {
      padding: 12px;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
    }
    select:focus { border-color: #005A9C; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th { background-color: #005A9C; color: white; }
    tr:hover { background-color: #f1f1f1; }

    .btn-view {
      background-color: #fbbc05;
      color: #333;
      padding: 8px 15px;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      display: inline-block;
    }
    .btn-view:hover { background-color: #e0a800; }

    @media (max-width: 800px) {
      .return-button { position: static; margin-bottom: 20px; }
      .header { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="index.html" class="return-button">← RETURN</a>
    <img src="logo.png" alt="GoodFarmer Logo" class="logo" />
  </div>

  <div class="container">
    <h1>VISOR DE REPORTES CLASIFICADOS</h1>
    
    <div class="filters">
      <div class="filter-group">
        <label for="exportadora">Exportadora:</label>
        <select id="exportadora">
          <option value="TODAS">-- Todas las Exportadoras --</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="finca">Finca:</label>
        <select id="finca">
          <option value="TODAS">-- Todas las Fincas --</option>
        </select>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Exportadora</th>
          <th>Finca</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="4" style="text-align:center;">Cargando reportes...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    // 👇👇👇 PEGA TU ENLACE CSV DEL GOOGLE SHEET DE RESPUESTAS AQUÍ 👇👇👇
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSXyVBfrzkdwBsHnPoJ379umr3ycOcOVhovFqSZFBNCL0FY5nzb_5kC6PnthYYWN-ZjQ0FPqOgH4575/pub?output=csv";
    // 👆👆👆 ======================================================= 👆👆👆

    let reportes = [];

    function procesarCSV(csvText) {
      const lineas = csvText.split('\n');
      const datos = [];
      
      // Empezar desde i = 1 para saltar los encabezados (Marca temporal, Exportadora, etc.)
      for (let i = 1; i < lineas.length; i++) {
        if (!lineas[i].trim()) continue; // saltar lineas vacías

        // Separar por comas respetando enlaces largos (por si el link del archivo tiene comas, aunque es raro)
        const cols = lineas[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || lineas[i].split(',');
        const limpias = cols.map(c => c.replace(/^"|"$/g, '').trim());

        // Asumiendo el orden estándar de Google Forms:
        // [0] Fecha, [1] Exportadora, [2] Finca, [3] Archivo
        if (limpias.length >= 4) {
          datos.push({
            fecha: limpias[0].split(" ")[0], // Solo la fecha, quitar la hora
            exportadora: limpias[1].toUpperCase(),
            finca: limpias[2].toUpperCase(),
            archivo: limpias[3]
          });
        }
      }
      return datos.reverse(); // Invertir para que los más nuevos salgan arriba
    }

    function renderTable() {
      const exportadoraFiltro = document.getElementById('exportadora').value;
      const fincaFiltro = document.getElementById('finca').value;
      const tbody = document.getElementById('table-body');
      
      tbody.innerHTML = '';

      const filtrados = reportes.filter(r => {
        const pasaExportadora = (exportadoraFiltro === 'TODAS' || r.exportadora === exportadoraFiltro);
        const pasaFinca = (fincaFiltro === 'TODAS' || r.finca === fincaFiltro);
        return pasaExportadora && pasaFinca;
      });

      if (filtrados.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No se encontraron reportes.</td></tr>';
        return;
      }

      filtrados.forEach(r => {
        const tr = document.createElement('tr');
        
        // Columna Fecha
        const tdFecha = document.createElement('td');
        tdFecha.textContent = r.fecha;
        tr.appendChild(tdFecha);

        // Columna Exportadora
        const tdExp = document.createElement('td');
        tdExp.textContent = r.exportadora;
        tr.appendChild(tdExp);

        // Columna Finca
        const tdFinca = document.createElement('td');
        tdFinca.textContent = r.finca;
        tr.appendChild(tdFinca);

        // Columna Acción (Botón Ver)
        const tdAccion = document.createElement('td');
        if (r.archivo && r.archivo.startsWith('http')) {
            const btn = document.createElement('a');
            btn.href = r.archivo;
            btn.target = "_blank";
            btn.className = "btn-view";
            btn.textContent = "Abrir Reporte";
            tdAccion.appendChild(btn);
        } else {
            tdAccion.textContent = "Sin archivo";
        }
        tr.appendChild(tdAccion);

        tbody.appendChild(tr);
      });
    }

    function poblarFiltros() {
      const selectExp = document.getElementById('exportadora');
      const selectFinca = document.getElementById('finca');
      
      const exportadoras = [...new Set(reportes.map(r => r.exportadora))].filter(Boolean).sort();
      const fincas = [...new Set(reportes.map(r => r.finca))].filter(Boolean).sort();

      exportadoras.forEach(e => {
        const opt = document.createElement('option');
        opt.value = e; opt.textContent = e;
        selectExp.appendChild(opt);
      });

      fincas.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f; opt.textContent = f;
        selectFinca.appendChild(opt);
      });

      // Agregar eventos para filtrar en vivo
      selectExp.addEventListener('change', renderTable);
      selectFinca.addEventListener('change', renderTable);
    }

    // Iniciar carga
    fetch(CSV_URL)
      .then(res => res.text())
      .then(csvText => {
        reportes = procesarCSV(csvText);
        poblarFiltros();
        renderTable();
      })
      .catch(error => {
        document.getElementById('table-body').innerHTML = '<tr><td colspan="4" style="text-align:center;color:red;">Error al cargar los datos.</td></tr>';
      });
  </script>
</body>
</html>
