<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buscador de Fincas y Orchard</title>
  
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
      color: #333;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background-color: #fff;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h2 {
      text-align: center;
      color: #ed1922;
    }
    .form-group {
      margin-bottom: 25px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }
    .select2-container .select2-selection--single {
      height: 45px;
      border-radius: 8px;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
    }
    .select2-container--default .select2-selection--single .select2-selection__arrow {
      height: 43px;
    }
    .orchard-result {
      margin-top: 30px;
      padding: 20px;
      background-color: #f1f1f1;
      border-left: 5px solid #ed1922;
      border-radius: 8px;
      display: none;
      font-size: 1.2rem;
    }
    .orchard-code {
      font-size: 2rem;
      font-weight: bold;
      color: #ed1922;
      display: block;
      margin-top: 10px;
    }
    .btn-back {
      display: block;
      text-align: center;
      margin-top: 20px;
      text-decoration: none;
      color: #ed1922;
      font-weight: bold;
    }
    #loading {
      text-align: center;
      color: #ed1922;
      font-weight: bold;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>BUSCAR FINCA / ORCHARD CODE</h2>

  <div id="loading">Cargando base de datos desde Google Sheets... ⏳</div>

  <div class="form-group">
    <label for="supplier">Seleccione Exportadora (Supplier):</label>
    <select id="supplier" style="width: 100%;" disabled>
      <option value="">Cargando...</option>
    </select>
  </div>

  <div class="form-group">
    <label for="farm">Seleccione Finca (Farm):</label>
    <select id="farm" style="width: 100%;" disabled>
      <option value="">Primero seleccione una exportadora</option>
    </select>
  </div>

  <div id="resultBox" class="orchard-result">
    Orchard Code de la Finca:
    <span id="orchardCodeText" class="orchard-code"></span>
  </div>

  <a href="index.html" class="btn-back">⬅ Volver al Menú Principal</a>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
  // ==========================================
  // PEGA AQUÍ EL ENLACE DE TU GOOGLE SHEETS PUBLICADO (.csv)
  // ==========================================
  const GOOGLE_SHEETS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS_e-zu9dC1Pzk3XmaKAMP4YhntP2yJ87Tkn6-uQd1flmv7cuY2yjdpK6XTZMKyCd2Qw7Ux41V8dUKx/pubhtml/pub?gid=0&single=true&output=csv";

  $(document).ready(function() {
    
    // Inicializar los buscadores
    $('#supplier').select2({ placeholder: "Escriba para buscar exportadora..." });
    $('#farm').select2({ placeholder: "Escriba para buscar finca..." });

    // Leer el Excel desde Drive
    Papa.parse(GOOGLE_SHEETS_CSV_URL, {
      download: true,
      header: true,
      complete: function(results) {
        
        $('#loading').hide();
        $('#supplier').prop('disabled', false);
        $('#supplier').empty().append(new Option("Seleccione una exportadora...", ""));

        const data = results.data;
        
        // 1. Filtrar las filas que tengan un Orchard Code válido
        const fincasValidas = data.filter(item => item["ORCHARD CODE"] && item["ORCHARD CODE"].trim() !== "");

        // 2. Extraer Exportadoras (SUPPLIER) únicas
        const exportadorasUnicas = [...new Set(fincasValidas.map(item => item["SUPPLIER"]))].filter(Boolean).sort();
        
        exportadorasUnicas.forEach(exp => {
          $('#supplier').append(new Option(exp, exp));
        });

        // 3. Cuando seleccionan un Supplier
        $('#supplier').on('change', function() {
          const exportadoraSeleccionada = $(this).val();
          const $farmSelect = $('#farm');
          
          $farmSelect.empty().append(new Option("Seleccione una finca...", ""));
          $('#resultBox').hide();

          if (exportadoraSeleccionada) {
            $farmSelect.prop('disabled', false);

            // Filtrar fincas por el Supplier seleccionado
            const fincasFiltradas = fincasValidas.filter(item => item["SUPPLIER"] === exportadoraSeleccionada);

            fincasFiltradas.forEach(fincaObj => {
              // Limpiar nombre: "AGRIPEPASA 4 - ANDRADE COMEX" -> "AGRIPEPASA 4"
              let nombreLimpio = fincaObj["FARMS AND SUPPLIER"] ? fincaObj["FARMS AND SUPPLIER"].split(" - ")[0].trim() : "";
              
              if(nombreLimpio) {
                // Se agrega la finca al selector; el valor interno será el ORCHARD CODE
                $farmSelect.append(new Option(nombreLimpio, fincaObj["ORCHARD CODE"]));
              }
            });
          } else {
            $farmSelect.prop('disabled', true);
          }
        });

        // 4. Cuando seleccionan una Finca
        $('#farm').on('change', function() {
          const orchardCode = $(this).val();
          if (orchardCode) {
            $('#orchardCodeText').text(orchardCode);
            $('#resultBox').fadeIn();
          } else {
            $('#resultBox').hide();
          }
        });

      },
      error: function() {
        $('#loading').text("Error al cargar la base de datos. Verifica el enlace.");
      }
    });

  });
</script>

</body>
</html>
