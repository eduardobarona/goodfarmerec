<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="logo.png" />
  <title>GOODFARMER FORMS</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
      padding: 20px;
      box-sizing: border-box;
      background-color: #f9f9f9;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section {
      flex: 1;
      min-width: 300px;
      max-width: 500px;
      background-color: #fff;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .section h2 {
      text-align: center;
      color: #ed1922;
      margin-bottom: 30px;
      margin-top: 30px;
    }
    
    .section h2:first-child {
      margin-top: 0;
    }

    .form-link, .view-button {
      display: block;
      text-decoration: none;
      background-color: #ed1922;
      color: white;
      padding: 15px 20px;
      border-radius: 10px;
      font-size: 1.1rem;
      text-align: center;
      margin-bottom: 20px;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .form-link:hover, .view-button:hover {
      background-color: #c2161b;
      transform: translateY(-2px);
    }

    /* --- ESTILO PARA EL BOTÓN VERDE DE ASISTENCIA --- */
    .btn-asistencia {
      background-color: #00B050; 
      font-weight: bold;
      border: 2px solid #00803a;
    }
    .btn-asistencia:hover {
      background-color: #00803a;
    }

    /* --- ESTILOS PARA LA SECCIÓN DE REPORTES --- */
    .btn-upload {
      background-color: #005A9C; /* Azul */
      font-weight: bold;
    }
    .btn-upload:hover { background-color: #003f6e; }

    .btn-edit {
      background-color: #fbbc05; /* Amarillo */
      color: #333;
      font-weight: bold;
    }
    .btn-edit:hover { background-color: #e0a800; color: #111; }

    .logo {
      display: block;
      margin: -40px auto;
      width: 250px;
      height: auto;
    }

    hr.divider {
      border: 0;
      height: 1px;
      background: #ddd;
      margin: 30px 0;
    }

    @media (max-width: 800px) {
      .container {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>

  <img src="logo.png" alt="GoodFarmer Logo" class="logo" />

  <h1 style="text-align: center; color: #ed1922;"> GOODFARMER FORMS </h1>

  <div class="container">
  <div class="section">
    <h2>FORMS</h2>
    <a class="form-link" href="bananaindex.html">BANANA</a>
    <a class="form-link" href="babybananaindex.html">BABY BANANA</a>
    
    <hr class="divider">

    <h2>ASISTENCIA / RRHH</h2>
    <a class="view-button btn-asistencia" href="asistencia.html">
      🔍 CONSULTAR DÍAS LIBRES
    </a>

    <hr class="divider">

    <h2>INFORMATION/LOCATION</h2>
    <a class="form-link" href="infoFarms.html">FARMS INFORMATION</a>
    <a class="form-link" href="fincas.html">BUSCADOR DE ORCHARD CODES</a>

    <hr class="divider">

    <h2>REPORTES</h2>
    
    <a class="form-link btn-upload" href="https://docs.google.com/forms/d/e/TU_LINK_DEL_FORMULARIO_AQUI/viewform" target="_blank">
      ⬆️ SUBIR NUEVO REPORTE
    </a>

    <a class="view-button btn-edit" href="reportes.html">
      🗂️ BUSCAR REPORTES CLASIFICADOS
    </a>

  </div>
</div>

</body>
</html>
